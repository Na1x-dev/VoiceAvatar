<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Voice Avatar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ЛЕВАЯ ПАНЕЛЬ УПРАВЛЕНИЯ -->
    <div id="sidebar">
        <div>
            <h3 class="panel-title">Аудиопоток</h3>
            <button id="start-btn" class="btn">🎙 Включить микрофон</button>
            <div class="vol-bar-container">
                <div id="vol-bar"></div>
            </div>
        </div>

        <!-- Настройка размера аватара -->
        <div>
            <h3 class="panel-title">Масштаб аватара</h3>
            <div class="input-row">
                <input type="range" id="size-slider" min="20" max="150" value="85">
                <span class="vol-val" id="size-val">85%</span>
            </div>
        </div>

        <div>
            <h3 class="panel-title">Базовые спрайты</h3>
            <div id="base-cards" class="cards-list"></div>
        </div>

        <div>
            <h3 class="panel-title">Дополнительные активности</h3>
            <div id="custom-cards" class="cards-list" style="margin-bottom: 15px;"></div>
            <button id="add-card-btn" class="btn btn-add" style="width: 100%;">+ Добавить спрайт</button>
        </div>
    </div>

    <!-- ПРАВАЯ ЗОНА (ХРОМАКЕЙ) -->
    <div id="render-zone">
        <img id="avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='100' height='100'><circle cx='50' cy='50' r='40' fill='white' opacity='0.5'/></svg>" alt="Avatar">
    </div>

    <script src="script.js"></script>
</body>
</html>
