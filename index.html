<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Avatar Studio</title>
    <!-- Встроенная SVG Фавиконка в виде фиолетового микрофона -->
    <link rel="icon" type="image/svg+xml" href="/sources/favicon.svg">
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ЛЕВАЯ ПАНЕЛЬ УПРАВЛЕНИЯ -->
    <div id="sidebar">
        <div class="sidebar-header">
            <svg class="brand-icon" viewBox="0 0 24 24"><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>
            <h2>Voice Avatar</h2>
        </div>

        <!-- Аудиопоток -->
        <div class="section-container">
            <button id="start-btn" class="btn btn-primary">
                <svg class="icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                <span>Включить микрофон</span>
            </button>
            <div class="vol-bar-container">
                <div id="vol-bar"></div>
            </div>
        </div>

        <!-- Масштаб и ориентация -->
        <div class="section-container card-panel">
            <h3 class="panel-title">Масштаб и ориентация</h3>
            <div class="input-row slider-group m3-slider-group">
                <input type="range" id="size-slider" min="20" max="300" value="85">
                <span class="vol-val" id="size-val">85%</span>
            </div>
            <button id="flip-btn" class="btn btn-secondary">
                <svg class="icon" viewBox="0 0 24 24"><path d="M15 16h4v2h-4zm0-8h4v2h-4zm0 4h4v2h-4zm-4-8v16c-4.42 0-8-3.58-8-8s3.58-8 8-8z"/></svg>
                Отзеркалить аватар
            </button>
        </div>

        <!-- Базовые спрайты -->
        <div class="section-container">
            <h3 class="panel-title">Базовые спрайты</h3>
            <div id="base-cards" class="cards-list"></div>
        </div>

        <!-- Дополнительные активности -->
        <div class="section-container">
            <h3 class="panel-title">Дополнительные активности</h3>
            <div id="custom-cards" class="cards-list"></div>
            <button id="add-card-btn" class="btn btn-add">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Добавить спрайт
            </button>
        </div>
    </div>

    <!-- ПРАВАЯ ЗОНА (ХРОМАКЕЙ) -->
    <div id="render-zone">
        <img id="avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='100' height='100'><circle cx='50' cy='50' r='40' fill='white' opacity='0.2'/></svg>" alt="Avatar">
    </div>

    <!-- МОДАЛЬНОЕ ОКНО СОЗДАНИЯ АКТИВНОСТЕЙ -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-card">
            <h3>Новая активность</h3>
            <p>Введите название для дополнительного спрайта (например: Крик, Смех, Злость)</p>
            <input type="text" id="modal-input" placeholder="Название активности..." autofocus>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn btn-secondary">Отмена</button>
                <button id="modal-confirm" class="btn btn-primary">Создать</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
